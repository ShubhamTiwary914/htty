name: Build, Test, Release CI for htty binary (linux-amd64) 
run-name: htty linux-amd64 release eCI ${{ github.event_name }} by ${{ github.actor }}
on:
  push:
    tags:
      - 'v*' # only run on version tags(ex: v1.1.0)

permissions:
  contents: write

jobs:
  release-linux-amd64:
    name: Release CI for htty (linux-amd64)
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v5
        with: 
          fetch-depth: 0 #fetch commit logs, etc..

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Install dependencies
        run: |
          go get .
    
      - name: Run Tests
        run: go test ./tests -v

      - name: Build
        run: go build -o htty-linux-amd64 . 

      - name: Compress binary with gz
        run: gzip -7 htty-linux-amd64

      - name: Generate changelog (since last tag)
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:"- %s (%h)" > CHANGELOG.md
          else
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" > CHANGELOG.md
          fi

      - name: Release on Github(releases)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }} 
          body_path: CHANGELOG.md
          files: htty-linux-amd64.gz
